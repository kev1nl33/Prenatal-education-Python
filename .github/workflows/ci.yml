name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Node.js dependencies
      run: npm ci

    - name: Run ESLint
      run: npx eslint . --ext .js --max-warnings 0
      continue-on-error: true

    - name: Test Python imports
      run: |
        python -c "import sys; print(f'Python version: {sys.version}')"
        python -c "from services.logger_setup import setup_logging; print('Logger import successful')"
        python -c "import api.ark; import api.tts; import api.voice_clone; import api.health; print('All API modules imported successfully')"

    - name: Check server starts
      run: |
        timeout 5 python server.py 8080 || echo "Server startup check completed"
      continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Security check with Safety
      run: safety check --json || true
      continue-on-error: true

    - name: Security check with Bandit
      run: bandit -r . -f json -o bandit-report.json || true
      continue-on-error: true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify project structure
      run: |
        echo "Checking project structure..."
        ls -la
        echo "Checking API directory..."
        ls -la api/
        echo "Checking services directory..."
        ls -la services/
        echo "Checking public directory..."
        ls -la public/ || echo "No public directory found"

    - name: Validate vercel.json
      run: |
        if [ -f vercel.json ]; then
          cat vercel.json | python -m json.tool
          echo "vercel.json is valid"
        fi

    - name: Check for secrets in code
      run: |
        if grep -r "sk-" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.log"; then
          echo "Warning: Potential API keys found in code"
          exit 1
        fi
        echo "No obvious secrets found in code"
      continue-on-error: true
